# Render Blueprint Configuration
# Deploys the Streamlit Dashboard using the Dockerfile

services:
  - type: web
    name: repository-review-platform
    runtime: docker
    plan: free
    dockerfilePath: deployment/Dockerfile
    envVars:
      - key: PORT
        value: "8501"
      - key: LLM_PROVIDER
        value: "gemini"
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
